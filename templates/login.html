{% extends "base.html" %}

{% block content %}

<div class="card p-4">

<h2>Login</h2>

<form method="POST">

<div class="mb-3">
<input type="email"
class="form-control"
name="email"
placeholder="Email"
required>
</div>

<div class="mb-3">
<input type="password"
class="form-control"
name="password"
placeholder="Password"
required>
</div>

<button class="btn btn-success">
Login
</button>

</form>

</div>

{% endblock %}
